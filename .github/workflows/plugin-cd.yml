name: Academic Summary Plugin CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PLUGIN_NAME: 'academic_summary'
  DEPLOY_TIME: ''

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: moodle
          MYSQL_HOST_AUTH_METHOD: trust
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
          include:
            - php: '8.1'
              moodle-branch: 'MOODLE_401_STABLE'
              database: mariadb
            - php: '8.2'
              moodle-branch: 'MOODLE_403_STABLE'
              database: mariadb
            - php: '8.3'
              moodle-branch: 'MOODLE_404_STABLE'
              database: mariadb
            - php: '8.4'
              moodle-branch: 'MOODLE_405_STABLE'
              database: mariadb
            - php: '8.4'
              moodle-branch: 'MOODLE_500_STABLE'
              database: mariadb

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, zip, gd, intl, mysqli
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci && pwd)/bin" >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-user=root \
            --db-pass=root \
            --db-name=moodle \
            --branch=${{ matrix.moodle-branch }} \
            --db-type=${{ matrix.database }}
        env:
          DB: ${{ matrix.database }}
          
      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Copy/Paste Detector
        run: moodle-plugin-ci phpcpd

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci codechecker

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc

      - name: Validar plugin
        run: moodle-plugin-ci validate

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show time to deploy
        run: echo "DEPLOY_TIME=$(date -u +'%Y%m%d%H%M')" >> $GITHUB_ENV
      
      - name: Prepare file of plugin
        run: |
          echo "Limpiando los archivo inncesesarios..."
            rm -rf /tmp/build
            mkdir -p /tmp/build/academic_summary
            rsync -a \
              --exclude .git \
              --exclude .github \
              --exclude .gitignore \
              --exclude tests \
              --exclude .vscode \
              --exclude ".DS_Store" \
              --exclude ".editorconfig" \
              ./ /tmp/build/academic_summary/
            ls -la /tmp/build/academic_summary
      
      - name: Create ZIP for Moodle
        run: |
          echo "Creando ZIP para: ${{ env.PLUGIN_NAME }}"
          cd /tmp/build
          zip -r ${{ env.PLUGIN_NAME }}.zip academic_summary
          mv ${{ env.PLUGIN_NAME }}.zip ${GITHUB_WORKSPACE}/${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip
          cd ${GITHUB_WORKSPACE}
          echo "ZIP creado correctamente"
          ls -lh ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip
          unzip -l ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}
          path: ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip
          compression-level: 0
          retention-days: 30