name: Academic Summary Plugin CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PLUGIN_NAME: 'academic_summary'
  DEPLOY_TIME: ''

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_HOST_AUTH_METHOD: trust
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: root
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -h 127.0.0.1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        moodle-branch: ['MOODLE_401_STABLE', 'MOODLE_403_STABLE', 'MOODLE_404_STABLE', 'MOODLE_405_STABLE', 'MOODLE_500_STABLE']
        database: ['mariadb', 'postgres']

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, zip, gd, intl, mysqli
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci && pwd)/bin" >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-user=root \
            --db-pass=root \
            --db-name=moodle \
            --branch=${{ matrix.moodle-branch }} \
            --db-type=${{ matrix.database }}
        env:
          DB: ${{ matrix.database }}
          
      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true # This step will show errors but will not fail
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0 --exclude="Universal.WhiteSpace.CommaSpacing,PSR12.Classes.ClassInstantiation,PSR12.Classes.OpeningBraceSpace,Universal.Lists.DisallowLongListSyntax,PSR2.Methods.FunctionCallSignature,PSR12.ControlStructures.ControlStructureSpacing,Squiz.WhiteSpace.ControlStructureSpacing,PSR2.ControlStructures.SwitchDeclaration,Squiz.Functions.MultiLineFunctionDeclaration,PSR2.Classes.ClassDeclaration"

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        id: behat
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show time to deploy
        run: echo "DEPLOY_TIME=$(date -u +'%Y%m%d%H%M')" >> $GITHUB_ENV
      
      - name: Prepare file of plugin
        run: |
          echo "Limpiando los archivo inncesesarios..."
            rm -rf /tmp/build
            mkdir -p /tmp/build/academic_summary
            rsync -a \
              --exclude .git \
              --exclude .github \
              --exclude .gitignore \
              --exclude tests \
              --exclude .vscode \
              --exclude ".DS_Store" \
              --exclude ".editorconfig" \
              ./ /tmp/build/academic_summary/
            ls -la /tmp/build/academic_summary
      
      - name: Create ZIP for Moodle
        run: |
          echo "Creando ZIP para: ${{ env.PLUGIN_NAME }}"
          cd /tmp/build
          zip -r ${{ env.PLUGIN_NAME }}.zip academic_summary
          mv ${{ env.PLUGIN_NAME }}.zip ${GITHUB_WORKSPACE}/${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip
          cd ${GITHUB_WORKSPACE}
          echo "ZIP creado correctamente"
          ls -lh ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip
          unzip -l ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}
          path: ${{ env.PLUGIN_NAME }}-${{ env.DEPLOY_TIME }}.zip
          compression-level: 0
          retention-days: 30